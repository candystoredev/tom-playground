<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom's Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.02em;
        }
        header p {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #888;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 640px;
        }
        .card {
            display: block;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, background 0.2s;
        }
        .card:hover {
            border-color: #444;
            background: #222;
        }
        .card-icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .card-desc {
            font-size: 0.85rem;
            color: #777;
            line-height: 1.4;
        }
        footer {
            margin-top: auto;
            padding-top: 3rem;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>
    <header>
        <h1>app.tomhoeck.com</h1>
        <p>A collection of small apps and experiments.</p>
    </header>

    <div class="grid">
        <a href="sax/" class="card">
            <div class="card-icon">&#127927;</div>
            <div class="card-title">Honor's Sax Jam</div>
            <div class="card-desc">A saxophone music game.</div>
        </a>
        <a href="hello/" class="card">
            <div class="card-icon">&#9889;</div>
            <div class="card-title">Hello World</div>
            <div class="card-desc">Deployment smoke test.</div>
        </a>
    </div>

    <footer>Tom Hoeck</footer>
</body>
</html>
