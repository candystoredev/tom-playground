<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Shop Reference Bible</title>
<meta name="description" content="Workshop quick-reference: unit converters, drill &amp; tap charts, lumber dimensions, wire gauge, torque specs, and more.">
<meta name="theme-color" content="#3a5a40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2eb;--bg2:#eae6dd;--bg3:#ddd9cf;
  --text:#2c2c2c;--text2:#555;--text3:#888;
  --accent:#3a5a40;--accent2:#588157;--accent-light:#a3b18a;
  --border:#ccc5b9;--border2:#b8b2a6;
  --mono:'SFMono-Regular',Consolas,'Liberation Mono','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --radius:6px;
}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  line-height:1.5;padding:0 0 4rem;min-height:100vh;
}
h1{font-size:1.35rem;font-weight:700;color:var(--accent);text-align:center;padding:1rem .75rem .25rem}
.subtitle{text-align:center;font-size:.8rem;color:var(--text3);margin-bottom:.75rem}

/* Search */
.search-wrap{position:sticky;top:0;z-index:20;background:var(--bg);padding:.5rem .75rem;border-bottom:1px solid var(--border)}
.search-wrap input{
  width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:var(--radius);
  font-size:.95rem;background:#fff;color:var(--text);outline:none;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(58,90,64,.15)}
.search-wrap input::placeholder{color:var(--text3)}

/* Sections */
.section{margin:.5rem .75rem;border:1px solid var(--border);border-radius:var(--radius);background:#fff;overflow:hidden}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem .85rem;cursor:pointer;user-select:none;
  background:var(--bg2);border-bottom:1px solid transparent;
  font-weight:600;font-size:.95rem;color:var(--text);
  transition:background .15s;
}
.section-header:hover{background:var(--bg3)}
.section-header .chevron{
  font-size:.7rem;transition:transform .2s;color:var(--text3);flex-shrink:0;margin-left:.5rem;
}
.section.open .section-header{border-bottom-color:var(--border)}
.section.open .chevron{transform:rotate(90deg)}
.section-body{display:none;padding:.75rem .85rem}
.section.open .section-body{display:block}

/* Converter panels */
.converter{margin-bottom:.75rem}
.converter label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.2rem;font-weight:500}
.converter input,.converter select{
  width:100%;padding:.45rem .6rem;border:1px solid var(--border);border-radius:var(--radius);
  font-size:.95rem;font-family:var(--mono);background:#fff;color:var(--text);
}
.converter select{appearance:auto}
.converter-row{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;align-items:end;margin-bottom:.5rem}
.converter-row .arrow{text-align:center;color:var(--accent);font-weight:700;padding-bottom:.45rem;font-size:1.1rem}
.quick-picks{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.35rem}
.quick-picks button{
  padding:.25rem .55rem;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);font-size:.78rem;font-family:var(--mono);cursor:pointer;
  color:var(--text);transition:background .1s,border-color .1s;
}
.quick-picks button:hover{background:var(--accent-light);border-color:var(--accent2)}
.result-display{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:.4rem .6rem;font-family:var(--mono);font-size:.95rem;min-height:2rem;
  display:flex;align-items:center;color:var(--accent);font-weight:600;
}
.converter-group{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--bg2)}
.converter-group:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.converter-group h3{font-size:.85rem;color:var(--accent);margin-bottom:.5rem;font-weight:600}

/* Tables */
.ref-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -.85rem;padding:0 .85rem}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:400px}
th{
  background:var(--bg2);padding:.4rem .5rem;text-align:left;font-weight:600;
  border-bottom:2px solid var(--border);color:var(--text);white-space:nowrap;
  position:sticky;top:0;
}
td{
  padding:.35rem .5rem;border-bottom:1px solid var(--bg2);font-family:var(--mono);
  white-space:nowrap;color:var(--text);
}
tr:hover td{background:rgba(58,90,64,.04)}
tr.highlight td{background:rgba(58,90,64,.1)}

/* Notes */
.notes-toggle{
  display:inline-flex;align-items:center;gap:.3rem;
  margin-top:.75rem;padding:.3rem .6rem;border:1px dashed var(--border);border-radius:var(--radius);
  background:transparent;font-size:.78rem;color:var(--text2);cursor:pointer;
}
.notes-toggle:hover{background:var(--bg2)}
.notes-area{display:none;margin-top:.5rem}
.notes-area.open{display:block}
.notes-area textarea{
  width:100%;min-height:3.5rem;padding:.5rem;border:1px solid var(--border);border-radius:var(--radius);
  font-size:.85rem;font-family:var(--sans);resize:vertical;background:var(--bg);color:var(--text);
}
.notes-area .save-hint{font-size:.7rem;color:var(--text3);margin-top:.2rem}

/* Home link */
.home-link{
  position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);
  font-size:.8rem;color:rgba(0,0,0,.3);text-decoration:none;z-index:10;
  transition:color .15s;
}
.home-link:hover{color:rgba(0,0,0,.6)}

/* No results */
.no-results{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:.9rem;display:none}

/* Responsive */
@media(min-width:640px){
  .section{margin:.5rem auto;max-width:720px}
  .search-wrap{padding:.5rem calc(50% - 360px + .75rem)}
  h1,.subtitle{max-width:720px;margin-left:auto;margin-right:auto}
}
@media(min-width:900px){
  .section{max-width:880px}
  .search-wrap{padding:.5rem calc(50% - 440px + .75rem)}
  h1,.subtitle{max-width:880px}
}
</style>

function fracToDecimal(n,d){ return n/d; }

function decimalToFrac(val){
  if(val<=0||val>1) return val===1?'1"':'--';
  let best=null, bestDiff=999;
  for(const [n,d] of FRACTIONS){
    const diff=Math.abs(val-n/d);
    if(diff<bestDiff){bestDiff=diff;best=[n,d];}
  }
  if(best) return best[0]+'/'+best[1]+'"';
  return val.toFixed(4)+'"';
}

function buildSection(id,title,body){
  return `<div class="section" data-section="${id}" id="sec-${id}">

    <div class="section-body">

    </div>

}

}

// ── Interaction ───────────────────────────────────────
function toggleSection(el){
  el.parentElement.classList.toggle('open');
}

function toggleNotes(btn){
  const area = btn.nextElementSibling;
  area.classList.toggle('open');
  if(area.classList.contains('open')){
    area.querySelector('textarea').focus();
  }
}

function saveNote(id,val){
  try{localStorage.setItem('shop-note-'+id,val);}catch(e){}
}
function loadNote(id){
  try{return localStorage.getItem('shop-note-'+id)||'';}catch(e){return '';}
}

// ── Converters ────────────────────────────────────────
function convertFrac(){
  const v = document.getElementById('fracIn').value.trim();
  const m = v.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(m){
    const dec = parseInt(m[1])/parseInt(m[2]);
    document.getElementById('decIn').value = dec.toFixed(4);
  }
}
function convertDec(){
  const v = parseFloat(document.getElementById('decIn').value);
  if(!isNaN(v)&&v>=0&&v<=1){
    document.getElementById('fracIn').value = decimalToFrac(v).replace('"','');
  }
}
function pickFrac(f){
  document.getElementById('fracIn').value = f;
  convertFrac();
}

const LEN_TO_IN = {in:1,ft:12,mm:1/25.4,cm:1/2.54,m:1/0.0254};
function convertLength(){
  const v = parseFloat(document.getElementById('lenVal').value);
  if(isNaN(v)){document.getElementById('lenResult').textContent='--';return;}
  const from=document.getElementById('lenFrom').value;
  const to=document.getElementById('lenTo').value;
  const inches = v * LEN_TO_IN[from];
  const result = inches / LEN_TO_IN[to];
  const units = {in:'in',ft:'ft',mm:'mm',cm:'cm',m:'m'};
  document.getElementById('lenResult').textContent = (Math.round(result*10000)/10000)+' '+units[to];
}

function convertWeight(dir){
  if(dir==='lbs'){
    const v=parseFloat(document.getElementById('lbsIn').value);
    document.getElementById('kgIn').value=isNaN(v)?'':(v*0.453592).toFixed(3);
  } else {
    const v=parseFloat(document.getElementById('kgIn').value);
    document.getElementById('lbsIn').value=isNaN(v)?'':(v/0.453592).toFixed(3);
  }
}

function convertTemp(dir){
  if(dir==='f'){
    const v=parseFloat(document.getElementById('fIn').value);
    document.getElementById('cIn').value=isNaN(v)?'':((v-32)*5/9).toFixed(1);
  } else {
    const v=parseFloat(document.getElementById('cIn').value);
    document.getElementById('fIn').value=isNaN(v)?'':(v*9/5+32).toFixed(1);
  }
}

// ── Search ────────────────────────────────────────────
function initSearch(){
  const input = document.getElementById('globalSearch');
  input.addEventListener('input', function(){
    const q = this.value.trim().toLowerCase();
    const sections = document.querySelectorAll('.section');
    let anyVisible = false;

    sections.forEach(sec=>{
      const secId = sec.dataset.section;
      if(secId === 'converters'){
        // always show converters unless searching
        if(!q){sec.style.display='';return;}
        const text = sec.textContent.toLowerCase();
        const match = text.includes(q);
        sec.style.display = match ? '' : 'none';
        if(match) anyVisible = true;
        return;
      }

      const rows = sec.querySelectorAll('tbody tr');
      if(!q){
        rows.forEach(r=>{r.style.display='';r.classList.remove('highlight');});
        sec.style.display='';
        anyVisible=true;
        return;
      }

      let secMatch=false;
      rows.forEach(r=>{
        const txt=r.textContent.toLowerCase();
        if(txt.includes(q)){
          r.style.display='';
          r.classList.add('highlight');
          secMatch=true;
        } else {
          r.style.display='none';
          r.classList.remove('highlight');
        }
      });

      // Also check section title / header text
      const headerText = sec.querySelector('.section-header span').textContent.toLowerCase();
      if(headerText.includes(q)) secMatch = true;

      sec.style.display = secMatch ? '' : 'none';
      if(secMatch){
        sec.classList.add('open');
        anyVisible=true;
      }
    });

    document.getElementById('noResults').style.display = (!anyVisible && q) ? 'block' : 'none';
  });
}

// ── Init ──────────────────────────────────────────────
buildApp();
initSearch();
