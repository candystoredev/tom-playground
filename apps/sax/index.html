<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honor's Sax Jam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .game {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .honor {
            font-size: 6rem;
            transition: transform 0.2s;
        }
        .honor.playing { transform: scale(1.15) rotate(-5deg); }
        .sax { font-size: 3.5rem; }
        h1 {
            font-size: 2rem;
            margin: 0.5rem 0 0.3rem;
            background: linear-gradient(90deg, #ffd700, #ffaa00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-bottom: 1rem;
            min-height: 1.5em;
        }
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            opacity: 0.7;
        }
        .note-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        .note-btn {
            aspect-ratio: 1;
            border: 3px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.3rem;
            font-family: 'Georgia', serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .note-btn .label { font-size: 0.8rem; opacity: 0.6; }
        .note-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
        }
        .note-btn:active:not(:disabled) { transform: scale(0.93); }
        .note-btn.lit {
            background: rgba(255, 215, 0, 0.35);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }
        .note-btn.correct {
            background: rgba(0, 255, 100, 0.3);
            border-color: #00ff64;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.3);
        }
        .note-btn.wrong {
            background: rgba(255, 50, 50, 0.35);
            border-color: #ff3232;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
        }
        .note-btn:disabled { cursor: default; opacity: 0.5; }
        .action-btn {
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }
        .notes-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .bg-note {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            animation: float-note 5s ease-out infinite;
        }
        .bg-note:nth-child(1) { left: 15%; animation-delay: 0s; }
        .bg-note:nth-child(2) { left: 35%; animation-delay: 1s; }
        .bg-note:nth-child(3) { left: 55%; animation-delay: 2s; }
        .bg-note:nth-child(4) { left: 75%; animation-delay: 3s; }
        .bg-note:nth-child(5) { left: 85%; animation-delay: 4s; }
        @keyframes float-note {
            0% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
            15% { opacity: 0.4; }
            75% { opacity: 0.4; }
            100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
        }
        .streak { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="notes-bg">
        <div class="bg-note">&#9835;</div>
        <div class="bg-note">&#9834;</div>
        <div class="bg-note">&#9833;</div>
        <div class="bg-note">&#9835;</div>
        <div class="bg-note">&#9834;</div>
    </div>

    <div class="game">
        <div class="honor" id="honor">&#128103;</div>
        <div class="sax">&#127927;</div>
        <h1>Honor's Sax Jam</h1>
        <p class="status" id="status">Can you keep up with Honor?</p>
        <div class="score-bar">
            <span>Round: <strong id="round">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Score: <strong id="score">0</strong></span>
        </div>

        <div class="note-grid" id="grid"></div>

        <button class="action-btn" id="startBtn" onclick="startGame()">Let's Jam!</button>
    </div>

    <script>
        const noteData = [
            { name: 'C', freq: 261.63, label: 'Do' },
            { name: 'D', freq: 293.66, label: 'Re' },
            { name: 'E', freq: 329.63, label: 'Mi' },
            { name: 'F', freq: 349.23, label: 'Fa' },
            { name: 'G', freq: 392.00, label: 'Sol' },
            { name: 'A', freq: 440.00, label: 'La' },
            { name: 'B', freq: 493.88, label: 'Ti' },
            { name: 'C\'', freq: 523.25, label: 'Do\'' },
        ];

        let audioCtx = null;
        let sequence = [];
        let playerIndex = 0;
        let round = 0;
        let score = 0;
        let best = 0;
        let accepting = false;

        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        const honor = document.getElementById('honor');
        const startBtn = document.getElementById('startBtn');

        // Build note buttons
        noteData.forEach((note, i) => {
            const btn = document.createElement('button');
            btn.className = 'note-btn';
            btn.id = 'note-' + i;
            btn.innerHTML = `<span>${note.name}</span><span class="label">${note.label}</span>`;
            btn.disabled = true;
            btn.addEventListener('click', () => playerPress(i));
            // Keyboard support: keys 1-8
            grid.appendChild(btn);
        });

        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 8 && accepting) {
                playerPress(num - 1);
            }
        });

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playTone(freq, duration = 0.35) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            // Sax-like: sawtooth + slight filter
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200;
            filter.Q.value = 2;
            gain.gain.setValueAtTime(0.18, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        function playWrong() {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            osc.frequency.value = 110;
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
        }

        function lightUp(index, className = 'lit', duration = 350) {
            const btn = document.getElementById('note-' + index);
            btn.classList.add(className);
            setTimeout(() => btn.classList.remove(className), duration);
        }

        function setButtons(enabled) {
            noteData.forEach((_, i) => {
                document.getElementById('note-' + i).disabled = !enabled;
            });
        }

        function updateDisplay() {
            document.getElementById('round').textContent = round;
            document.getElementById('best').textContent = best;
            document.getElementById('score').textContent = score;
        }

        async function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        async function playSequence() {
            accepting = false;
            setButtons(false);
            status.textContent = "Honor is playing... Watch closely!";
            honor.classList.add('playing');

            await sleep(600);

            const speed = Math.max(350, 600 - round * 25);
            for (let i = 0; i < sequence.length; i++) {
                const idx = sequence[i];
                lightUp(idx, 'lit', speed - 80);
                playTone(noteData[idx].freq, speed / 1000);
                await sleep(speed);
            }

            honor.classList.remove('playing');
            status.textContent = "Your turn! Repeat the melody";
            setButtons(true);
            accepting = true;
            playerIndex = 0;
        }

        function nextRound() {
            round++;
            const next = Math.floor(Math.random() * noteData.length);
            sequence.push(next);
            updateDisplay();
            playSequence();
        }

        function playerPress(index) {
            if (!accepting) return;

            lightUp(index, 'lit', 200);
            playTone(noteData[index].freq, 0.25);

            if (index === sequence[playerIndex]) {
                lightUp(index, 'correct', 300);
                playerIndex++;
                score += 10;
                updateDisplay();

                if (playerIndex === sequence.length) {
                    accepting = false;
                    setButtons(false);
                    score += round * 5; // bonus for completing a round
                    updateDisplay();

                    const cheers = [
                        "Nailed it!",
                        "You're on fire!",
                        "Honor is impressed!",
                        "Saxophone superstar!",
                        "Incredible ear!",
                        "Can't stop the groove!",
                        "Jazz hands!",
                    ];
                    status.innerHTML = `<span class="streak">${cheers[Math.min(round - 1, cheers.length - 1)]}</span> Get ready...`;

                    setTimeout(() => nextRound(), 1500);
                }
            } else {
                // Wrong note
                accepting = false;
                lightUp(index, 'wrong', 600);
                playWrong();
                setButtons(false);
                if (round > best) best = round;
                updateDisplay();
                honor.classList.remove('playing');
                status.textContent = `Game over! You reached round ${round}`;
                startBtn.textContent = 'Play Again';
                startBtn.style.display = '';
            }
        }

        function startGame() {
            sequence = [];
            playerIndex = 0;
            round = 0;
            score = 0;
            updateDisplay();
            startBtn.style.display = 'none';
            nextRound();
        }
    </script>
</body>
</html>
